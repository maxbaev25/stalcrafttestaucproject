name: Автозапуск ruff

on:
  pull_request:
    branches:
      - master
jobs:
  ruff:
    name: Автозапуск ruff
    runs-on: ubuntu-latest

    steps:
      - name: Скачивание кода
        uses: actions/checkout@v4

      - name: python install
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: install ruff
        run: |
          pip install ruff
      - name: ruff run
        run: ruff check --output-format=github

      - name: shutdown ruff
        if: always()
        run: |
          echo "Ruff shutdown"